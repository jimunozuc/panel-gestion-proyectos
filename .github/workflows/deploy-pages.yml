name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (producción)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout develop (desarrollo)
        uses: actions/checkout@v4
        with:
          ref: develop
          path: dev-src

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (main)
        working-directory: main-src/frontend
        run: npm ci

      - name: Build main → /
        working-directory: main-src/frontend
        run: npm run build
        env:
          NODE_ENV: production
          BASE_PATH: /panel-gestion-proyectos/

      - name: Install deps (develop)
        working-directory: dev-src/frontend
        run: npm ci

      - name: Build develop → /dev/
        working-directory: dev-src/frontend
        run: npm run build
        env:
          NODE_ENV: production
          BASE_PATH: /panel-gestion-proyectos/dev/

      - name: Combinar sitios (producción en raíz, desarrollo en /dev/)
        run: |
          mkdir -p site/dev
          cp -r main-src/frontend/dist/. site/
          cp -r dev-src/frontend/dist/. site/dev/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
